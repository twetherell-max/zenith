<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Radial Notch Dock – Pie Crust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background:
          radial-gradient(circle at 0% 0%, #ff9b5f 0, rgba(255,155,95,0) 38%),
          radial-gradient(circle at 100% 0%, #ff4da3 0, rgba(255,77,163,0) 42%),
          radial-gradient(circle at 0% 100%, #5a2cff 0, rgba(90,44,255,0) 42%),
          radial-gradient(circle at 100% 100%, #ff7b4a 0, rgba(255,123,74,0) 42%),
          #12001f;
      }


      .notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 32px;
        border-radius: 0 0 16px 16px;
        background: #050608;
        z-index: 20;
      }

      .dock-root {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%) translateY(var(--dock-drop-y, 36px));
        width: 340px;
        height: 140px;
        opacity: 1;
        pointer-events: auto;
        transition:
          transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1),
          opacity 160ms ease;
      }

      .notch:hover + .dock-root,
      .dock-root:hover {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(var(--dock-drop-y, 36px));
      }


      .dock-shell {
        position: absolute;
        left: 50%;
        top: 60px;
        transform: translateX(-50%);
        width: 340px;
        height: 100px;
        overflow: hidden;
        border-radius: 0 0 999px 999px;
        pointer-events: none;
      }

      .dock-glass {
        position: absolute;
        left: 50%;
        top: -175px;
        transform: translateX(-50%);
        width: 340px;
        height: 340px;
        border-radius: 999px;
        background: none;
      }

      .dock-notch-mask {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 38px;
        border-radius: 0 0 18px 18px;
        background: #050608;
        pointer-events: none;
        z-index: 25;
      }

      .dock-crust,
      .dock-icons {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .dock-icon {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        pointer-events: auto;
        transition:
          transform 140ms ease,
          background-color 140ms ease;
      }

      .dock-icon:hover {
        transform: translateY(-6px) scale(1.08);
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="notch"></div>

    <div class="dock-root">
      <div class="dock-shell">
        <div class="dock-glass"></div>
      </div>
      <div class="dock-notch-mask"></div>

      <!-- Pie-crust segments -->
      <svg id="dock-crust" class="dock-crust" viewBox="0 0 340 140"></svg>

      <!-- Icons -->
      <div id="dock-icons" class="dock-icons"></div>
    </div>

    <script>
      // --- Configuration knobs (tuning hooks) ---
      // Adjust these values to customize spacing and shape.
      const VISIBLE_START_DEG = 205; // left edge of visible arc
      const VISIBLE_END_DEG = -25; // right edge of visible arc
      const R_INNER = 96; // inner ring radius (px) - change this to resize the ring
      const R_OUTER = 112; // outer ring radius (px) - change this to resize the ring
      const R_ICON = R_OUTER; // icon radius (px) - distance from center for icon placement
      const ICON_SPREAD_FACTOR = 1.0; // 0.5 = tighter icon cluster, 1.0 default spacing, 1.2 wider spacing
      const CENTER_X = 170; // circle center x (px, container coords)
      const CENTER_Y = -10; // circle center y (px, relative to top of dock-root)
      const DOCK_DROP_Y = 36; // how far the dock drops on hover (px)

      // Default icons (will be replaced by Swift)
      let ICONS = ["🧭", "🗂️", "💬", "✉️", "🌐", "🎵", "⚙️"];
      let iconData = []; // Store full icon data from Swift
      const debugLayer = document.createElement('div');
      debugLayer.style.position = 'absolute';
      debugLayer.style.left = '10px';
      debugLayer.style.top = '10px';
      debugLayer.style.color = '#fff';
      debugLayer.style.fontSize = '12px';
      debugLayer.style.zIndex = '999';
      debugLayer.textContent = 'radial-dock loaded';
      document.body.appendChild(debugLayer);

      // --- Swift Communication Bridge ---
      function setupMessageHandler() {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.radialDock) {
          window.swiftConnected = true;
        }
      }
      setupMessageHandler();

      // Called from Swift to update icons
      window.updateIcons = function(data) {
        if (!data || !Array.isArray(data)) return;
        
        iconData = data;
        ICONS = data.map(d => d.icon || "❓");
        
        // Redraw icons
        const iconLayer = document.getElementById("dock-icons");
        iconLayer.innerHTML = "";
        
        ICONS.forEach((emoji, index) => {
          const item = iconData[index] || {};
          const t = ICONS.length === 1 ? 0.5 : (index + 0.5) / ICONS.length;
          const spreadT = lerp(0.5, 1.0, ICON_SPREAD_FACTOR);
          const centerDeg = VISIBLE_START_DEG + (VISIBLE_END_DEG - VISIBLE_START_DEG) * (t * spreadT + (1 - spreadT) / 2);
          
          const iconRad = toRad(centerDeg);
          const iconX = CENTER_X + R_ICON * Math.cos(iconRad);
          const iconY = CENTER_Y + R_ICON * Math.sin(iconRad);
          
          const el = document.createElement("button");
          el.type = "button";
          el.className = "dock-icon";
          el.textContent = emoji;
          el.dataset.id = item.id || "";
          el.dataset.action = item.action || "";
          el.dataset.actionType = item.actionType || "";
          el.style.left = `${iconX}px`;
          el.style.top = `${iconY}px`;
          el.style.transform = "translate(-50%, -50%)";
          
          el.addEventListener("click", () => {
            if (window.swiftConnected) {
              window.webkit.messageHandlers.radialDock.postMessage({
                type: "iconClick",
                id: item.id,
                action: item.action,
                actionType: item.actionType
              });
            }
          });
          
          el.addEventListener("mouseenter", () => {
            if (window.swiftConnected) {
              window.webkit.messageHandlers.radialDock.postMessage({
                type: "iconHover",
                id: item.id
              });
            }
          });
          
          iconLayer.appendChild(el);
        });
      };

      // Called from Swift to set hover state
      window.setHoveredIcon = function(id) {
        const buttons = document.querySelectorAll(".dock-icon");
        buttons.forEach(btn => {
          if (btn.dataset.id === id) {
            btn.style.transform = "translate(-50%, -50%) translateY(-6px) scale(1.08)";
            btn.style.background = "rgba(255, 255, 255, 0.3)";
          } else {
            btn.style.transform = "translate(-50%, -50%)";
            btn.style.background = "rgba(255, 255, 255, 0.15)";
          }
        });
      };

      // Called from Swift to clear hover
      window.clearHover = function() {
        const buttons = document.querySelectorAll(".dock-icon");
        buttons.forEach(btn => {
          btn.style.transform = "translate(-50%, -50%)";
          btn.style.background = "rgba(255, 255, 255, 0.15)";
        });
      };

      // Called from Swift to expand/collapse dock
      window.setExpanded = function(expanded) {
        const dockRoot = document.querySelector(".dock-root");
        const notch = document.querySelector(".notch");
        if (expanded) {
          dockRoot.style.opacity = "1";
          dockRoot.style.pointerEvents = "auto";
          dockRoot.style.transform = "translateX(-50%) translateY(var(--dock-drop-y, 36px))";
        } else {
          dockRoot.style.opacity = "0";
          dockRoot.style.pointerEvents = "none";
          dockRoot.style.transform = "translateX(-50%)";
        }
      };

      const crustSvg = document.getElementById("dock-crust");
      const iconLayer = document.getElementById("dock-icons");
      const dockRoot = document.querySelector(".dock-root");

      // Apply drop distance to CSS variable for hover animation
      dockRoot.style.setProperty("--dock-drop-y", `${DOCK_DROP_Y}px`);

      const toRad = (deg) => (deg * Math.PI) / 180;
      const lerp = (a, b, t) => a + (b - a) * t;

      // Initial fallback icons to ensure UI is visible
      updateIcons([
        { id: '1', icon: '🧭', action: 'nav', actionType: 'open' },
        { id: '2', icon: '🗂️', action: 'files', actionType: 'open' },
        { id: '3', icon: '💬', action: 'chat', actionType: 'open' },
        { id: '4', icon: '✉️', action: 'mail', actionType: 'open' },
        { id: '5', icon: '🌐', action: 'web', actionType: 'open' },
        { id: '6', icon: '🎵', action: 'music', actionType: 'open' },
        { id: '7', icon: '⚙️', action: 'settings', actionType: 'open' }
      ]);
      setExpanded(true);

      // --- Draw one smooth, continuous ring (outer + inner arcs) ---
      (function drawRing() {
        const startRad = toRad(VISIBLE_START_DEG);
        const endRad = toRad(VISIBLE_END_DEG);

        const x0o = CENTER_X + R_OUTER * Math.cos(startRad);
        const y0o = CENTER_Y + R_OUTER * Math.sin(startRad);
        const x1o = CENTER_X + R_OUTER * Math.cos(endRad);
        const y1o = CENTER_Y + R_OUTER * Math.sin(endRad);

        const x0i = CENTER_X + R_INNER * Math.cos(startRad);
        const y0i = CENTER_Y + R_INNER * Math.sin(startRad);
        const x1i = CENTER_X + R_INNER * Math.cos(endRad);
        const y1i = CENTER_Y + R_INNER * Math.sin(endRad);

        const d = [
          `M ${x0o} ${y0o}`,
          `A ${R_OUTER} ${R_OUTER} 0 0 1 ${x1o} ${y1o}`,
          `L ${x1i} ${y1i}`,
          `A ${R_INNER} ${R_INNER} 0 0 0 ${x0i} ${y0i}`,
          "Z",
        ].join(" ");

        const ring = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path"
        );
        ring.setAttribute("d", d);
        ring.setAttribute("fill", "rgba(255,255,255,0.08)");
        ring.setAttribute("stroke", "rgba(255,255,255,0.15)");
        ring.setAttribute("stroke-width", "1");
        // optional: remove drop-shadow for minimal style
        ring.removeAttribute("style");
        crustSvg.appendChild(ring);
      })();

      // Initial icon render (will be replaced by Swift)
      if (ICONS.length > 0 && iconData.length === 0) {
        window.updateIcons(ICONS.map(icon => ({ icon: icon, id: "", action: "", actionType: "" })));
      }
    </script>
  </body>
</html>
