<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Radial Notch Dock – Pie Crust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background: transparent;
      }


      .dock-root {
        position: absolute;
        left: 50%;
        top: 10px;
        transform: translateX(-50%) translateY(-40px);
        width: 340px;
        height: 220px;
        opacity: 0;
        pointer-events: none;
        transition:
          transform 180ms cubic-bezier(0.2, 0.8, 0.35, 1),
          opacity 180ms ease;
      }
      .dock-root.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }

      .dock-trigger:hover ~ .dock-root,
      .dock-root:hover {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }

      .dock-trigger {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 220px;
        height: 34px;
        pointer-events: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .dock-trigger::before {
        content: "";
        width: 72px;
        height: 6px;
        border-radius: 99px;
        background: rgba(255,255,255,.35);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
        margin-top: 6px;
      }


      .dock-shell {
        position: absolute;
        left: 50%;
        top: 20px;
        transform: translateX(-50%);
        width: 340px;
        height: 180px;
        overflow: hidden;
        border-radius: 0 0 999px 999px;
        pointer-events: none;
        background: transparent;
        border: none;
      }

      .dock-glass {
        position: absolute;
        left: 50%;
        top: -172px;
        transform: translateX(-50%);
        width: 320px;
        height: 320px;
        border-radius: 999px;
        background: transparent;
      }


      .dock-crust,
      .dock-icons {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .dock-root.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }
      .dock-trigger:hover .dock-icons,
      .dock-root:hover .dock-icons {
        pointer-events: auto;
      }

      .dock-icon {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        pointer-events: auto;
        transition:
          transform 140ms ease,
          background-color 140ms ease;
      }

      .dock-icon:hover {
        transform: translateY(-6px) scale(1.08);
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="dock-trigger">
      <div class="dock-root">
        <div class="dock-shell">
          <div class="dock-glass"></div>
        </div>
        <div class="dock-notch-mask"></div>

        <!-- Pie-crust segments -->
        <svg id="dock-crust" class="dock-crust" viewBox="0 0 340 140"></svg>

        <!-- Icons -->
        <div id="dock-icons" class="dock-icons"></div>
      </div>
    </div>

    <script>
      // --- Configuration knobs (tuning hooks) ---
      // Adjust these values to customize spacing and shape.
      const VISIBLE_START_DEG = 210; // left edge of visible arc
      const VISIBLE_END_DEG = -30; // right edge of visible arc
      const R_INNER = 88; // inner ring radius (px) - change this to resize the ring
      const R_OUTER = 116; // outer ring radius (px) - change this to resize the ring
      const R_ICON = 108; // icon radius (px) - distance from center for icon placement
      const ICON_SPREAD_FACTOR = 1.0; // 0.5 = tighter icon cluster, 1.0 default spacing, 1.2 wider spacing
      const CENTER_X = 170; // circle center x (px, container coords)
      const CENTER_Y = 40; // circle center y (px, relative to top of dock-root)
      const DOCK_DROP_Y = 28; // how far the dock drops on hover (px)

      // Default icons (will be replaced by Swift)
      let ICONS = ["🧭", "🗂️", "💬", "✉️", "🌐", "🎵", "⚙️"];
      let iconData = []; // Store full icon data from Swift

      // --- Swift Communication Bridge ---
      function setupMessageHandler() {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.radialDock) {
          window.swiftConnected = true;
        }
      }
      setupMessageHandler();

      // Called from Swift to update icons
      window.updateIcons = function(data) {
        if (!data || !Array.isArray(data)) return;
        
        iconData = data;
        ICONS = data.map(d => d.icon || "❓");
        
        // Redraw icons
        const iconLayer = document.getElementById("dock-icons");
        iconLayer.innerHTML = "";
        
        ICONS.forEach((emoji, index) => {
          const item = iconData[index] || {};
          const t = ICONS.length === 1 ? 0.5 : (index + 0.5) / ICONS.length;
          const spreadT = lerp(0.5, 1.0, ICON_SPREAD_FACTOR);
          const centerDeg = VISIBLE_START_DEG + (VISIBLE_END_DEG - VISIBLE_START_DEG) * (t * spreadT + (1 - spreadT) / 2);
          
          const iconRad = toRad(centerDeg);
          const iconX = CENTER_X + R_ICON * Math.cos(iconRad);
          const iconY = CENTER_Y + R_ICON * Math.sin(iconRad);
          
          const el = document.createElement("button");
          el.type = "button";
          el.className = "dock-icon";
          el.textContent = emoji;
          el.dataset.id = item.id || "";
          el.dataset.action = item.action || "";
          el.dataset.actionType = item.actionType || "";
          el.style.left = `${iconX}px`;
          el.style.top = `${iconY}px`;
          el.style.transform = "translate(-50%, -50%)";
          
          el.addEventListener("click", () => {
            if (window.swiftConnected) {
              window.webkit.messageHandlers.radialDock.postMessage({
                type: "iconClick",
                id: item.id,
                action: item.action,
                actionType: item.actionType
              });
            }
          });
          
          el.addEventListener("mouseenter", () => {
            if (window.swiftConnected) {
              window.webkit.messageHandlers.radialDock.postMessage({
                type: "iconHover",
                id: item.id
              });
            }
          });
          
          iconLayer.appendChild(el);
        });
      };

      // Called from Swift to set hover state
      window.setHoveredIcon = function(id) {
        const buttons = document.querySelectorAll(".dock-icon");
        buttons.forEach(btn => {
          if (btn.dataset.id === id) {
            btn.style.transform = "translate(-50%, -50%) translateY(-6px) scale(1.08)";
            btn.style.background = "rgba(255, 255, 255, 0.3)";
          } else {
            btn.style.transform = "translate(-50%, -50%)";
            btn.style.background = "rgba(255, 255, 255, 0.15)";
          }
        });
      };

      // Called from Swift to clear hover
      window.clearHover = function() {
        const buttons = document.querySelectorAll(".dock-icon");
        buttons.forEach(btn => {
          btn.style.transform = "translate(-50%, -50%)";
          btn.style.background = "rgba(255, 255, 255, 0.15)";
        });
      };

      // Called from Swift to expand/collapse dock
      window.setExpanded = function(expanded) {
        const dockRoot = document.querySelector(".dock-root");
        if (!dockRoot) return;
        if (expanded) {
          dockRoot.classList.add("show");
        } else {
          dockRoot.classList.remove("show");
        }
      };

      const crustSvg = document.getElementById("dock-crust");
      const iconLayer = document.getElementById("dock-icons");
      const dockRoot = document.querySelector(".dock-root");

      // Apply drop distance to CSS variable for hover animation
      dockRoot.style.setProperty("--dock-drop-y", `${DOCK_DROP_Y}px`);

      function setupHoverMotion() {
        // Simple approach: track mouse position globally
        let isHovering = false;
        let closeTimer = null;
        
        document.addEventListener('mousemove', (e) => {
          // Check if mouse is in the notch/dock area (top of window)
          const inNotchArea = e.clientY < 100 && e.clientX > window.innerWidth/2 - 150 && e.clientX < window.innerWidth/2 + 150;
          
          if (inNotchArea && !isHovering) {
            isHovering = true;
            console.log('Mouse in notch area, showing dock');
            dockRoot.classList.add('show');
          } else if (!inNotchArea && isHovering) {
            isHovering = false;
            console.log('Mouse left notch area, hiding dock');
            dockRoot.classList.remove('show');
          }
        });
      }

      const toRad = (deg) => (deg * Math.PI) / 180;
      const lerp = (a, b, t) => a + (b - a) * t;

      // Initial fallback icons to ensure UI is visible
      updateIcons([
        { id: '1', icon: '🧭', action: 'nav', actionType: 'open' },
        { id: '2', icon: '🗂️', action: 'files', actionType: 'open' },
        { id: '3', icon: '💬', action: 'chat', actionType: 'open' },
        { id: '4', icon: '✉️', action: 'mail', actionType: 'open' },
        { id: '5', icon: '🌐', action: 'web', actionType: 'open' },
        { id: '6', icon: '🎵', action: 'music', actionType: 'open' },
        { id: '7', icon: '⚙️', action: 'settings', actionType: 'open' }
      ]);
      setExpanded(false);
      setupHoverMotion();
      
      // Auto-show on load for testing
      // setExpanded(true);

      // --- Draw one smooth, continuous ring (outer + inner arcs) ---
      (function drawRing() {
        const startRad = toRad(VISIBLE_START_DEG);
        const endRad = toRad(VISIBLE_END_DEG);

        const x0o = CENTER_X + R_OUTER * Math.cos(startRad);
        const y0o = CENTER_Y + R_OUTER * Math.sin(startRad);
        const x1o = CENTER_X + R_OUTER * Math.cos(endRad);
        const y1o = CENTER_Y + R_OUTER * Math.sin(endRad);

        const x0i = CENTER_X + R_INNER * Math.cos(startRad);
        const y0i = CENTER_Y + R_INNER * Math.sin(startRad);
        const x1i = CENTER_X + R_INNER * Math.cos(endRad);
        const y1i = CENTER_Y + R_INNER * Math.sin(endRad);

        const d = [
          `M ${x0o} ${y0o}`,
          `A ${R_OUTER} ${R_OUTER} 0 0 1 ${x1o} ${y1o}`,
          `L ${x1i} ${y1i}`,
          `A ${R_INNER} ${R_INNER} 0 0 0 ${x0i} ${y0i}`,
          "Z",
        ].join(" ");

        const ring = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path"
        );
        ring.setAttribute("d", d);
        ring.setAttribute("fill", "rgba(255,255,255,0.1)");
        ring.setAttribute("stroke", "rgba(255,255,255,0.2)");
        ring.setAttribute("stroke-width", "1");
        crustSvg.appendChild(ring);
      })();

      // Initial icon render (will be replaced by Swift)
      if (ICONS.length > 0 && iconData.length === 0) {
        window.updateIcons(ICONS.map(icon => ({ icon: icon, id: "", action: "", actionType: "" })));
      }
    </script>
  </body>
</html>
