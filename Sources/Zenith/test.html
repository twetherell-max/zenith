<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: orange; overflow: hidden; }
#notch {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 200px; height: 50px; background: rgba(255,255,255,0.4); cursor: pointer;
}
#dock {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 200px; background: rgba(255,255,255,0.2);
  display: flex; justify-content: center; align-items: center; gap: 20px;
}
.icon { width: 50px; height: 50px; background: blue; border-radius: 10px; }
</style>
</head>
<body>
<div id="notch"></div>
<div id="dock">
  <div class="icon">1</div>
  <div class="icon">2</div>
  <div class="icon">3</div>
  <div class="icon">4</div>
  <div class="icon">5</div>
</div>
<script>
const notch = document.getElementById('notch');
const dock = document.getElementById('dock');
notch.onmouseenter = () => dock.style.display = 'flex';
notch.onmouseleave = () => dock.style.display = 'none';
</script>
</body>
</html>
